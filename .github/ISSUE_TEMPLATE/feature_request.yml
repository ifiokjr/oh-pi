name: ✨ Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion. Tell us about the feature you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve or improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Share any other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any extra context that would help explain the request.
