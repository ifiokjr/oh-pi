[group.default]
packages = [
	"@monopi/adaptive-routing",
	"@monopi/agents",
	"@monopi/analytics-dashboard",
	"@monopi/analytics-db",
	"@monopi/analytics-extension",
	"@monopi/background-tasks",
	"@monopi/cli",
	"@monopi/core",
	"@monopi/provider-cursor",
	"@monopi/diagnostics",
	"@monopi/docs",
	"@monopi/extension-answer",
	"@monopi/extension-prompt-modes",
	"@monopi/extension-files",
	"@monopi/extension-goal",
	"@monopi/extension-review",
	"@monopi/extension-todos",
	"@monopi/extension-watchdog",
	"@monopi/extension-bg-process",
	"@monopi/extension-btw",
	"@monopi/extension-compact-header",
	"@monopi/extension-custom-footer",
	"@monopi/extension-external-editor",
	"@monopi/extension-git-guard",
	"@monopi/extension-scheduler",
	"@monopi/extension-shell-format",
	"@monopi/extension-tool-metadata",
	"@monopi/extension-usage-tracker",
	"@monopi/extension-worktree",
	"@monopi/extension-shared",
	"@monopi/context",
	"@monopi/monopi",
	"@monopi/provider-ollama",
	"@monopi/bash-live-view",
	"@monopi/pretty",
	"@monopi/remote-tailscale",
	"@monopi/provider-catalog",
	"@monopi/shared-qna",
	"@monopi/skills",
	"@monopi/subagents",
	"@monopi/web-client",
	"@monopi/web-remote",
	"@monopi/web-server",
	"@monopi/db",
]
tag = true
release = true
version_format = "primary"


[lints]
use = ["cargo/baseline", "npm/baseline", "dart/baseline"]


[ecosystems.cargo]
enabled = true


[ecosystems.npm]
enabled = true


[changesets.affected]
enabled = true

required = true

skip_labels = []

comment_on_failure = true

changed_paths = []

ignored_paths = []


[cli.change]
help_text = "Create a new changeset file for the next release"
[[cli.change.steps]]
type = "CreateChangeFile"

[[cli.change.steps]]
type = "Command"
command = "pnpm format"

[cli.release]
help_text = "Bump versions, update changelog, create git tag, and push"
[[cli.release.steps]]
type = "Command"
command = "pnpm security:check"

[[cli.release.steps]]
type = "PrepareRelease"

[[cli.release.steps]]
type = "Command"
command = "pnpm install --lockfile-only"

[[cli.release.steps]]
type = "Command"
command = "git add ."

[[cli.release.steps]]
type = "Command"
command = "git commit -m 'chore: release $version'"

[[cli.release.steps]]
type = "Command"
command = "git push"

[[cli.release.steps]]
type = "CommitRelease"

[cli.publish]
help_text = "Build and publish all public packages to npm"
[[cli.publish.steps]]
type = "Command"
command = "pnpm build"

[[cli.publish.steps]]
type = "Command"
command = "pnpm -r publish --access public --no-git-checks"

[cli.get-version]
help_text = "Print the current version"
[[cli.get-version.steps]]
type = "Command"
command = "echo $version"
