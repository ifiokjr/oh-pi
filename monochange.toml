# ── Lockstep group ────────────────────────────────────────────────────────

[group.all]
packages = [
  "@ifi/pi-extension-adaptive-routing",
  "@ifi/oh-pi-agents",
  "@ifi/pi-analytics-dashboard",
  "@ifi/pi-analytics-db",
  "@ifi/pi-analytics-extension",
  "@ifi/pi-background-tasks",
  "@ifi/oh-pi-cli",
  "@ifi/oh-pi-core",
  "@ifi/pi-provider-cursor",
  "@ifi/pi-diagnostics",
  "@ifi/oh-pi-docs",
  "@ifi/oh-pi-extensions",
  "@ifi/oh-pi",
  "@ifi/oh-pi-context",
  "@ifi/pi-provider-ollama",
  "@ifi/pi-bash-live-view",
  "@ifi/pi-pretty",
  "@ifi/pi-remote-tailscale",
  "@ifi/pi-plan",
  "@ifi/oh-pi-prompts",
  "@ifi/pi-provider-catalog",
  "@ifi/pi-shared-qna",
  "@ifi/oh-pi-skills",
  "@ifi/pi-spec",
  "@ifi/pi-extension-subagents",
  "@ifi/oh-pi-themes",
  "@ifi/pi-web-client",
  "@ifi/pi-web-remote",
  "@ifi/pi-web-server",
]
release = true
tag = true
version_format = "namespaced"
changelog = { path = "CHANGELOG.md", format = "keep_a_changelog", include = "all" }

# ── Ecosystems ────────────────────────────────────────────────────────────

[ecosystems.npm]
enabled = true
lockfile_commands = ["pnpm install --lockfile-only"]

# ── CLI workflows ─────────────────────────────────────────────────────────

[cli.release-pr]
help_text = "Prepare a release pull request"
inputs = [
  { name = "format", type = "choice", choices = ["markdown", "json"], default = "markdown" },
  { name = "no_verify", type = "boolean", default = false },
]
steps = [
  { name = "plan release", type = "PrepareRelease", allow_empty_changesets = true },
  { name = "refresh lockfile", type = "Command", command = "pnpm install --lockfile-only", when = "{{ number_of_changesets > 0 }}" },
  { name = "create release commit", type = "CommitRelease", when = "{{ number_of_changesets > 0 }}" },
  { name = "open release request", type = "OpenReleaseRequest", when = "{{ number_of_changesets > 0 }}" },
]

[cli.release]
help_text = "Bump versions, update changelogs, commit, tag, and push"
steps = [
  { name = "security check", type = "Command", command = "pnpm security:check" },
  { name = "plan release", type = "PrepareRelease" },
  { name = "refresh lockfile", type = "Command", command = "pnpm install --lockfile-only" },
  { name = "stage changes", type = "Command", command = "git add ." },
  { name = "commit release", type = "CommitRelease" },
  { name = "tag release", type = "TagRelease" },
  { name = "push release", type = "Command", command = "git push" },
]

[cli.publish]
help_text = "Build and publish all public packages to npm"
steps = [
  { name = "build", type = "Command", command = "pnpm build" },
  { name = "publish packages", type = "Command", command = "pnpm -r publish --access public --no-git-checks" },
]

[cli.change]
help_text = "Create a new changeset file for the next release"
inputs = [
  { name = "package", type = "string_list", required = true },
  { name = "bump", type = "choice", choices = ["none", "patch", "minor", "major"], default = "patch" },
  { name = "reason", type = "string", required = true },
  { name = "type", type = "string" },
  { name = "caused_by", type = "string_list" },
]
steps = [{ name = "create change file", type = "CreateChangeFile" }]