# monochange configuration for oh-pi
# Migrated from knope — all 29 packages in lockstep under group "all"

[defaults]
package_type = "npm"
parent_bump = "patch"
include_private = true

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "keep_a_changelog"

[source]
provider = "github"
owner = "ifiokjr"
repo = "oh-pi"

